<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa de Mano - Concierto para Madres y Padres</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html, body{
            width:100%;
            height:100%;
            overflow:hidden;
            background:#111;
            font-family:Arial, Helvetica, sans-serif;
        }

        .contenedor{
            width:100%;
            height:100vh;
        }

        iframe{
            width:100%;
            height:100%;
            border:none;
        }

        .mensaje{
            position:fixed;
            top:10px;
            left:50%;
            transform:translateX(-50%);
            background:rgba(0,0,0,.7);
            color:white;
            padding:10px 18px;
            border-radius:20px;
            font-size:14px;
            z-index:1000;
        }

        @media (max-width: 768px){
            .mensaje{
                width:90%;
                text-align:center;
                font-size:13px;
            }
        }
    </style>
</head>
<body>

    <div class="mensaje">
        Programa de Mano · Concierto para Madres y Padres
    </div>

    <div class="contenedor">
        <iframe
            src="Programa-de-Mano.pdf#view=FitH"
            title="Programa de Mano">
        </iframe>
    </div>

</body>
</html>
